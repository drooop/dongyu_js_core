---
# Remote Worker ConfigMap (cloud)
apiVersion: v1
kind: ConfigMap
metadata:
  name: remote-worker-config
  namespace: dongyu
data:
  MQTT_HOST: "emqx-emqx-enterprise.emqx.svc.cluster.local"
  MQTT_PORT: "1883"
  MQTT_USER: ""
  MQTT_PASS: ""
  WORKER_ID: "2"
---
# Remote Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-worker
  namespace: dongyu
  labels:
    app: remote-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remote-worker
  template:
    metadata:
      labels:
        app: remote-worker
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: worker
        image: dy-remote-worker:v3
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: remote-worker-config
        env:
        - name: DY_PERSISTED_ASSET_ROOT
          value: /app/persisted-assets
        volumeMounts:
        - name: persisted-assets
          mountPath: /app/persisted-assets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: persisted-assets
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/assets
          type: DirectoryOrCreate
---
# Workspace Manager ConfigMap (cloud)
apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-manager-config
  namespace: dongyu
data:
  MQTT_HOST: "emqx-emqx-enterprise.emqx.svc.cluster.local"
  MQTT_PORT: "1883"
  MQTT_USER: ""
  MQTT_PASS: ""
  WORKER_ID: "WM1"
  DY_WORKER_SCOPE: "workspace-manager"
  DY_WORKER_LOG_PREFIX: "workspace-manager"
---
# Workspace Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-manager
  namespace: dongyu
  labels:
    app: workspace-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-manager
  template:
    metadata:
      labels:
        app: workspace-manager
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: worker
        image: dy-remote-worker:v3
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: workspace-manager-config
        env:
        - name: DY_PERSISTED_ASSET_ROOT
          value: /app/persisted-assets
        volumeMounts:
        - name: persisted-assets
          mountPath: /app/persisted-assets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: persisted-assets
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/assets
          type: DirectoryOrCreate
---
# MBR Worker ConfigMap (cloud)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mbr-worker-config
  namespace: dongyu
data:
    NODE_TLS_REJECT_UNAUTHORIZED: "0"
---
# MBR Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbr-worker
  namespace: dongyu
  labels:
    app: mbr-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mbr-worker
  template:
    metadata:
      labels:
        app: mbr-worker
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: mbr
        image: dy-mbr-worker:v2
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: mbr-worker-config
        - secretRef:
            name: mbr-worker-secret
        env:
        - name: DY_PERSISTED_ASSET_ROOT
          value: /app/persisted-assets
        volumeMounts:
        - name: persisted-assets
          mountPath: /app/persisted-assets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: persisted-assets
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/assets
          type: DirectoryOrCreate
---
# UI Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-server
  namespace: dongyu
  labels:
    app: ui-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-server
  template:
    metadata:
      labels:
        app: ui-server
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: server
        image: dy-ui-server:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 9000
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: MODELTABLE_PATCH_JSON
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: MODELTABLE_PATCH_JSON
        - name: SEED_POSITIVE_MODELS_ON_BOOT
          value: "0"
        - name: DY_UI_SERVER_WORKER_ID
          value: "U1"
        - name: DY_AUTH
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_AUTH
        - name: DY_OIDC_ISSUER
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_ISSUER
        - name: DY_OIDC_CLIENT_ID
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_CLIENT_ID
        - name: DY_OIDC_CLIENT_SECRET
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_CLIENT_SECRET
        - name: DY_OIDC_REDIRECT_URI
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_REDIRECT_URI
        - name: DY_OIDC_SCOPE
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_SCOPE
        - name: DY_OIDC_STATE_SECRET
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_OIDC_STATE_SECRET
        - name: DY_SESSION_SECRET
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_SESSION_SECRET
        - name: DY_AUTH_SECRET
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: DY_AUTH_SECRET
        - name: MATRIX_HOMESERVER_URL
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: MATRIX_HOMESERVER_URL
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: DY_LLM_ENABLED
          value: "0"
        - name: DY_PERSIST_ROOT
          value: /app/.dy_persist
        - name: DY_PERSISTED_ASSET_ROOT
          value: /app/persisted-assets
        volumeMounts:
        - name: persist-data
          mountPath: /app/.dy_persist
        - name: persisted-assets
          mountPath: /app/persisted-assets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: persist-data
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/ui-server
          type: DirectoryOrCreate
      - name: persisted-assets
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/assets
          type: DirectoryOrCreate
---
# UI Server Service
apiVersion: v1
kind: Service
metadata:
  name: ui-server
  namespace: dongyu
spec:
  selector:
    app: ui-server
  ports:
  - port: 9000
    targetPort: 9000
---
# UI Server Ingress with TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui-server
  namespace: dongyu
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.dongyudigital.com
    secretName: ui-server-tls
  rules:
  - host: app.dongyudigital.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui-server
            port:
              number: 9000
---
# UI Server 1 Deployment (isolated app1 debug surface)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-server-1
  namespace: dongyu
  labels:
    app: ui-server-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-server-1
  template:
    metadata:
      labels:
        app: ui-server-1
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: server
        image: dy-ui-server:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 9000
        env:
        - name: HOST
