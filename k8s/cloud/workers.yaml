              key: MODELTABLE_PATCH_JSON
        - name: SEED_POSITIVE_MODELS_ON_BOOT
          value: "0"
        - name: DY_UI_SERVER_WORKER_ID
          value: "U1D"
        - name: DY_AUTH
          value: "0"
        - name: MATRIX_HOMESERVER_URL
          value: null
          valueFrom:
            secretKeyRef:
              name: ui-server-secret
              key: MATRIX_HOMESERVER_URL
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: DY_LLM_ENABLED
          value: "0"
        - name: DY_PERSIST_ROOT
          value: /app/.dy_persist
        - name: DY_PERSISTED_ASSET_ROOT
          value: /app/persisted-assets
        volumeMounts:
        - name: persist-data
          mountPath: /app/.dy_persist
        - name: persisted-assets
          mountPath: /app/persisted-assets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: persist-data
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/ui-server-1
          type: DirectoryOrCreate
      - name: persisted-assets
        hostPath:
          path: /home/wwpic/dongyu/volume/persist/assets
          type: DirectoryOrCreate
---
# UI Server 1 Service
apiVersion: v1
kind: Service
metadata:
  name: ui-server-1
  namespace: dongyu
spec:
  selector:
    app: ui-server-1
  ports:
  - port: 9000
    targetPort: 9000
