<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型挂载关系图</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="./viz-model-mounting-data.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fafafa; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useMemo, useState } = React;
const DATA = window.MODEL_MOUNTING_DATA;

const colorMap = {
  root:   { bg: "#fffbeb", border: "#f59e0b", text: "#92400e" },
  system: { bg: "#eff6ff", border: "#3b82f6", text: "#1e3a8a" },
  page:   { bg: "#fef3c7", border: "#f59e0b", text: "#92400e" },
  user:   { bg: "#ecfdf5", border: "#22c55e", text: "#166534" },
};

function toneFor(model) {
  if (!model) return colorMap.user;
  if (model.id === 0) return colorMap.root;
  return colorMap[model.kind] || colorMap.user;
}

function ModelCard({ model }) {
  const tone = toneFor(model);
  return (
    <div style={{
      background: tone.bg,
      border: "1px solid " + tone.border,
      borderRadius: 8,
      padding: "10px 12px",
      minWidth: 210,
    }}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontFamily: "monospace", fontWeight: 700, color: tone.text }}>{model.id}</span>
        <span style={{ fontSize: 10, borderRadius: 999, padding: "2px 6px", background: "#fff", color: tone.text, border: "1px solid " + tone.border }}>
          {model.form || "unknown"}
        </span>
        <span style={{ fontSize: 10, color: "#64748b" }}>{model.runtimeType || model.kind}</span>
      </div>
      <div style={{ fontSize: 12, fontWeight: 600, color: "#0f172a", marginTop: 4 }}>{model.title}</div>
      <div style={{ fontSize: 11, color: "#475569", marginTop: 2, lineHeight: 1.45 }}>{model.desc || "无补充说明"}</div>
    </div>
  );
}

function SummaryCards({ profile }) {
  const cards = [
    { label: "已声明模型", value: profile.modelCount, color: "#111827" },
    { label: "挂载声明", value: profile.mountCount, color: "#111827" },
    { label: "未挂载模型", value: profile.audit.unmountedCount, color: "#dc2626" },
    { label: "多重挂载 child", value: profile.audit.duplicateCount, color: "#ea580c" },
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12, marginBottom: 18 }}>
      {cards.map((card) => (
        <div key={card.label} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 14 }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: card.color }}>{card.value}</div>
          <div style={{ fontSize: 12, color: "#64748b" }}>{card.label}</div>
        </div>
      ))}
    </div>
  );
}

function TreeView({ modelsById, mounts }) {
  const childSet = new Set(mounts.map((mount) => mount.child));
  const roots = [...modelsById.values()].filter((model) => model.id === 0 || !childSet.has(model.id)).map((model) => model.id).sort((a, b) => a - b);
  const childrenOf = new Map();
  for (const mount of mounts) {
    if (!childrenOf.has(mount.parent)) childrenOf.set(mount.parent, []);
    childrenOf.get(mount.parent).push(mount);
  }
  for (const list of childrenOf.values()) list.sort((a, b) => a.child - b.child);

  function renderNode(modelId, keyPrefix) {
    const model = modelsById.get(modelId);
    const children = childrenOf.get(modelId) || [];
    return (
      <div key={keyPrefix} style={{ marginTop: 8 }}>
        <ModelCard model={model} />
        {children.length > 0 && (
          <div style={{ borderLeft: "2px solid #e2e8f0", marginLeft: 12, paddingLeft: 12, marginTop: 6 }}>
            {children.map((mount, index) => (
              <div key={`${keyPrefix}:${mount.child}:${index}`} style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: "#64748b", marginBottom: 4 }}>
                  {mount.cell} · {mount.relPath}
                </div>
                {renderNode(mount.child, `${keyPrefix}:${mount.child}:${index}`)}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  return <div style={{ display: "grid", gap: 16 }}>{roots.map((rootId) => renderNode(rootId, `root:${rootId}`))}</div>;
}

function AuditView({ profile, modelsById }) {
  return (
    <div style={{ display: "grid", gap: 18 }}>
      <section style={{ background: "#fff", border: "1px solid #fecaca", borderRadius: 8, padding: 14 }}>
        <h3 style={{ fontSize: 14, color: "#991b1b", marginBottom: 8 }}>未挂载模型</h3>
        {profile.audit.unmountedModels.length === 0 ? (
          <div style={{ fontSize: 12, color: "#166534" }}>该 profile 已无未挂载模型。</div>
        ) : (
          <div style={{ display: "grid", gap: 8 }}>
            {profile.audit.unmountedModels.map((model) => (
              <div key={model.id} style={{ fontSize: 12, color: "#334155" }}>
                <span style={{ fontFamily: "monospace", fontWeight: 700 }}>{model.id}</span>
                <span style={{ marginLeft: 8 }}>{modelsById.get(model.id)?.title || model.title}</span>
              </div>
            ))}
          </div>
        )}
      </section>
      <section style={{ background: "#fff", border: "1px solid #fdba74", borderRadius: 8, padding: 14 }}>
        <h3 style={{ fontSize: 14, color: "#9a3412", marginBottom: 8 }}>多重挂载 child</h3>
        {profile.audit.duplicateChildren.length === 0 ? (
          <div style={{ fontSize: 12, color: "#166534" }}>该 profile 已无多重挂载 child。</div>
        ) : (
          <div style={{ display: "grid", gap: 10 }}>
            {profile.audit.duplicateChildren.map((item) => (
              <div key={item.child} style={{ fontSize: 12, color: "#334155" }}>
                <div style={{ fontFamily: "monospace", fontWeight: 700, marginBottom: 4 }}>
                  {item.child} · {modelsById.get(item.child)?.title || `Model ${item.child}`}
                </div>
                {item.entries.map((entry, index) => (
                  <div key={`${item.child}:${index}`} style={{ marginLeft: 12, color: "#64748b" }}>
                    parent={entry.parent} · cell={entry.cell} · {entry.relPath}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
      </section>
    </div>
  );
}

function TableView({ mounts, modelsById }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, background: "#fff" }}>
        <thead>
          <tr style={{ background: "#f8fafc" }}>
            {["parent", "cell", "child", "child title", "source"].map((h) => (
              <th key={h} style={{ textAlign: "left", padding: "8px 10px", borderBottom: "1px solid #e2e8f0" }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {mounts.map((mount, index) => (
            <tr key={`${mount.parent}:${mount.child}:${index}`} style={{ borderBottom: "1px solid #f1f5f9" }}>
              <td style={{ padding: "6px 10px", fontFamily: "monospace" }}>{mount.parent}</td>
              <td style={{ padding: "6px 10px", fontFamily: "monospace" }}>{mount.cell}</td>
              <td style={{ padding: "6px 10px", fontFamily: "monospace" }}>{mount.child}</td>
              <td style={{ padding: "6px 10px" }}>{modelsById.get(mount.child)?.title || `Model ${mount.child}`}</td>
              <td style={{ padding: "6px 10px", fontFamily: "monospace", fontSize: 10 }}>{mount.relPath}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function App() {
  if (!DATA) {
    return <div style={{ padding: 24, color: "#991b1b" }}>缺少 `viz-model-mounting-data.js`。先运行 `node scripts/ops/model_mounting_analyzer.mjs --write-viz`。</div>;
  }

  const profileIds = Object.keys(DATA.profiles);
  const [profileId, setProfileId] = useState('ui-server');
  const [tab, setTab] = useState('audit');
  const profile = DATA.profiles[profileId] || DATA.profiles[profileIds[0]];
  const visibleModelIds = new Set(profile.modelIds);
  const visibleModels = DATA.models.filter((model) => visibleModelIds.has(model.id));
  const modelsById = new Map(visibleModels.map((model) => [model.id, model]));
  const mounts = profile.mounts || [];

  const profileBtn = (id) => ({
    padding: "8px 12px",
    fontSize: 12,
    borderRadius: 18,
    border: "1px solid " + (profileId === id ? "#2563eb" : "#cbd5e1"),
    background: profileId === id ? "#dbeafe" : "#fff",
    color: profileId === id ? "#1d4ed8" : "#334155",
    cursor: "pointer",
  });
  const tabBtn = (id) => ({
    padding: "10px 16px",
    fontSize: 13,
    border: "none",
    background: "none",
    cursor: "pointer",
    color: tab === id ? "#111827" : "#64748b",
    borderBottom: tab === id ? "2px solid #111827" : "2px solid transparent",
    fontWeight: tab === id ? 700 : 500,
  });

  return (
    <div style={{ maxWidth: 1180, margin: "0 auto", padding: "24px 16px 40px" }}>
      <h1 style={{ fontSize: 24, fontWeight: 800, color: "#0f172a", marginBottom: 4 }}>模型挂载关系图 (worker profiles)</h1>
      <p style={{ fontSize: 13, color: "#64748b", marginBottom: 12 }}>
        数据来自 `scripts/ops/model_mounting_analyzer.mjs`，生成时间：{DATA.generatedAt}
      </p>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        {profileIds.map((id) => (
          <button key={id} style={profileBtn(id)} onClick={() => setProfileId(id)}>
            {DATA.profiles[id].label} · unmounted={DATA.profiles[id].audit.unmountedCount} · dup={DATA.profiles[id].audit.duplicateCount}
          </button>
        ))}
      </div>

      <SummaryCards profile={profile} />

      <div style={{ display: "flex", gap: 0, marginBottom: 18, borderBottom: "1px solid #e2e8f0", flexWrap: "wrap" }}>
        <button style={tabBtn('audit')} onClick={() => setTab('audit')}>审计视图</button>
        <button style={tabBtn('tree')} onClick={() => setTab('tree')}>树形视图</button>
        <button style={tabBtn('table')} onClick={() => setTab('table')}>挂载表</button>
      </div>

      {tab === 'audit' && <AuditView profile={profile} modelsById={modelsById} />}
      {tab === 'tree' && <TreeView modelsById={modelsById} mounts={mounts} />}
      {tab === 'table' && <TableView mounts={mounts} modelsById={modelsById} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
